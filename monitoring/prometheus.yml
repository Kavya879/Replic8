global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: query-router
    metrics_path: /metrics
    static_configs:
      - targets:
          - query-router:3000

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: postgres-exporter-primary
    static_configs:
      - targets:
          - postgres-exporter-primary:9187

  - job_name: postgres-exporter-replica-1
    static_configs:
      - targets:
          - postgres-exporter-replica-1:9187

  - job_name: postgres-exporter-replica-2
    static_configs:
      - targets:
          - postgres-exporter-replica-2:9187