services:
  postgres-primary:
    build:
      context: ./docker/postgres/primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-primary-password}
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-change-me-replication-password}
    volumes:
      - pg-primary-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - pg-cluster

  query-router:
    build:
      context: ./query-router
    environment:
      NODE_ENV: production
      PORT: "3000"
      PRIMARY_DB_HOST: postgres-primary
      PRIMARY_DB_PORT: "5432"
      PRIMARY_DB_NAME: ${POSTGRES_DB:-appdb}
      PRIMARY_DB_USER: ${POSTGRES_USER:-postgres}
      PRIMARY_DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-primary-password}
      REPLICA_DB_HOSTS: postgres-replica-1,postgres-replica-2
      REPLICA_DB_PORT: "5432"
      REPLICA_DB_NAME: ${POSTGRES_DB:-appdb}
      REPLICA_DB_USER: ${POSTGRES_USER:-postgres}
      REPLICA_DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-primary-password}
      MONITOR_INTERVAL_MS: "5000"
      STALE_REPLICA_THRESHOLD_MS: "15000"
      LATENCY_TARGET_MS: "200"
      CPU_WEIGHT: "0.30"
      MEMORY_WEIGHT: "0.25"
      CONNECTION_WEIGHT: "0.20"
      LATENCY_WEIGHT: "0.25"
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pg-cluster

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - query-router
      - node-exporter
      - postgres-exporter-primary
      - postgres-exporter-replica-1
      - postgres-exporter-replica-2
    restart: unless-stopped
    networks:
      - pg-cluster

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - pg-cluster

  postgres-exporter-primary:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me-primary-password}@postgres-primary:5432/${POSTGRES_DB:-appdb}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      postgres-primary:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pg-cluster

  postgres-exporter-replica-1:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me-primary-password}@postgres-replica-1:5432/${POSTGRES_DB:-appdb}?sslmode=disable
    ports:
      - "9188:9187"
    depends_on:
      postgres-replica-1:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pg-cluster

  postgres-exporter-replica-2:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me-primary-password}@postgres-replica-2:5432/${POSTGRES_DB:-appdb}?sslmode=disable
    ports:
      - "9189:9187"
    depends_on:
      postgres-replica-2:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pg-cluster

  postgres-replica-1:
    build:
      context: ./docker/postgres/replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      PRIMARY_HOST: postgres-primary
      PRIMARY_PORT: "5432"
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-change-me-replication-password}
    volumes:
      - pg-replica-1-data:/var/lib/postgresql/data
    expose:
      - "5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - pg-cluster

  postgres-replica-2:
    build:
      context: ./docker/postgres/replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
      PRIMARY_HOST: postgres-primary
      PRIMARY_PORT: "5432"
      REPLICATION_USER: ${REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD:-change-me-replication-password}
    volumes:
      - pg-replica-2-data:/var/lib/postgresql/data
    expose:
      - "5432"
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - pg-cluster

volumes:
  pg-primary-data:
  pg-replica-1-data:
  pg-replica-2-data:
  prometheus-data:

networks:
  pg-cluster:
    internal: true