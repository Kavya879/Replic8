name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  query-router-tests:
    name: Query Router unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: query-router/package-lock.json

      - name: Install dependencies
        working-directory: query-router
        run: npm ci

      - name: Run unit tests
        working-directory: query-router
        run: npm test

  dashboard-build:
    name: Dashboard build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build
        working-directory: dashboard
        run: npm run build

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build all images
        run: docker compose build
